<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./src/css/main.css">
</head>

<body>
    <header class="app-header">
        <nav class="navbar navbar-dark app-navbar">
            <div class="container-fluid app-nav-container">
                <a class="navbar-brand app-brand" href="#" aria-label="Pokedex">
                    <img src="./src/img/logo.png" alt="Logo Pokedex" class="app-logo">
                </a>

                <div class="nav-copy">
                    <span>Pokedex Explorer</span>
                    <strong>Busca, filtra y revisa evoluciones</strong>
                </div>

                <form class="app-search input-group" role="search">
                    <span class="input-group-text">Buscar</span>
                    <input class="form-control" type="search" id="pokemonSearch" placeholder="Nombre del Pokemon"
                        aria-label="Buscar Pokemon por nombre">
                </form>
            </div>
        </nav>
    </header>

    <main class="container-fluid app-main">
        <div class="pokedex-layout">
            <aside class="filter-sidebar">
                <div class="filter-card">
                    <div class="filter-heading">
                        <span>Filtros</span>
                        <strong>Generacion y tipo</strong>
                    </div>

                    <div>
                        <h2>Generacion</h2>
                        <div class="generation-filter" role="toolbar" aria-label="Filtro por generacion">
                            <button class="btn btn-generation active-generation" type="button" data-generation="1">Gen I</button>
                            <button class="btn btn-generation" type="button" data-generation="2">Gen II</button>
                            <button class="btn btn-generation" type="button" data-generation="3">Gen III</button>
                            <button class="btn btn-generation" type="button" data-generation="4">Gen IV</button>
                            <button class="btn btn-generation" type="button" data-generation="5">Gen V</button>
                            <button class="btn btn-generation" type="button" data-generation="6">Gen VI</button>
                            <button class="btn btn-generation" type="button" data-generation="7">Gen VII</button>
                            <button class="btn btn-generation" type="button" data-generation="8">Gen VIII</button>
                            <button class="btn btn-generation" type="button" data-generation="9">Gen IX</button>
                        </div>
                    </div>

                    <div>
                        <h2>Tipo</h2>
                        <ul class="nav nav-pills nav-list" aria-label="Filtro por tipo">
                            <li class="nav-item"><button class="btn btn-header" id="ver-todos" type="button">Ver todos</button></li>
                            <li class="nav-item"><button class="btn btn-header normal" id="normal" type="button">Normal</button></li>
                            <li class="nav-item"><button class="btn btn-header fire" id="fire" type="button">Fire</button></li>
                            <li class="nav-item"><button class="btn btn-header water" id="water" type="button">Water</button></li>
                            <li class="nav-item"><button class="btn btn-header grass" id="grass" type="button">Grass</button></li>
                            <li class="nav-item"><button class="btn btn-header electric" id="electric" type="button">Electric</button></li>
                            <li class="nav-item"><button class="btn btn-header ice" id="ice" type="button">Ice</button></li>
                            <li class="nav-item"><button class="btn btn-header fighting" id="fighting" type="button">Fighting</button></li>
                            <li class="nav-item"><button class="btn btn-header poison" id="poison" type="button">Poison</button></li>
                            <li class="nav-item"><button class="btn btn-header ground" id="ground" type="button">Ground</button></li>
                            <li class="nav-item"><button class="btn btn-header flying" id="flying" type="button">Flying</button></li>
                            <li class="nav-item"><button class="btn btn-header psychic" id="psychic" type="button">Psychic</button></li>
                            <li class="nav-item"><button class="btn btn-header bug" id="bug" type="button">Bug</button></li>
                            <li class="nav-item"><button class="btn btn-header rock" id="rock" type="button">Rock</button></li>
                            <li class="nav-item"><button class="btn btn-header ghost" id="ghost" type="button">Ghost</button></li>
                            <li class="nav-item"><button class="btn btn-header dragon" id="dragon" type="button">Dragon</button></li>
                            <li class="nav-item"><button class="btn btn-header steel" id="steel" type="button">Steel</button></li>
                            <li class="nav-item"><button class="btn btn-header fairy" id="fairy" type="button">Fairy</button></li>
                        </ul>
                    </div>
                </div>
            </aside>

            <section id="todos" class="pokemon-results">
                <div class="results-heading">
                    <span>Resultados</span>
                    <strong>Pokedex nacional</strong>
                </div>
                <div class="pokemon-todos" id="listaPokemon"></div>
            </section>
        </div>
    </main>

    <div class="modal fade pokemon-modal" id="pokemonModal" tabindex="-1" aria-labelledby="modalPokemonTitle"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-xl">
            <div class="modal-content modal-card">
                <div class="modal-header pokemon-modal-header">
                    <h2 class="modal-title" id="modalPokemonTitle">Detalles del Pokemon</h2>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Cerrar"></button>
                </div>
                <div class="modal-body pokemon-modal-body" id="modalContent"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./src/js/main.js"></script>
</body>

</html>
